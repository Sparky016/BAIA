<div class="review-page">
  <header>
    <h1>Review Gherkin</h1>
    <div class="actions">
      <button
        class="btn-approve"
        (click)="approve()"
        [disabled]="isApproved"
        [attr.aria-pressed]="isApproved">
        {{ isApproved ? 'Approved' : 'Approve' }}
      </button>
    </div>
  </header>
  <app-gherkin-editor />
  <app-export-panel [runId]="runId" />
</div>
