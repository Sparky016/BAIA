<div class="progress-page">
  <div class="progress-header">
    <h1 class="text-title">BAIA Analysis</h1>
    <span class="run-id-chip">
      Run: <code data-testid="run-id">{{ runId }}</code>
    </span>
  </div>

  <!-- Phase Stepper -->
  <div class="phase-stepper">
    <ng-container *ngFor="let phase of phases; let i = index; let last = last">
      <div
        class="phase-chip"
        [ngClass]="phaseClass(phase, i)"
      >{{ phase }}</div>
      <div class="phase-connector" *ngIf="!last"></div>
    </ng-container>
  </div>

  <!-- Current Operation Strip -->
  <div class="op-strip" [class.error]="hasError()">
    <div class="op-label">
      <span>Current operation</span>
      <span *ngIf="stepCount() > 0">Step {{ stepCount() }}</span>
      <span data-testid="run-status">{{ store.status() }}</span>
    </div>
    <div class="op-message">{{ currentOperation() }}</div>
  </div>

  <!-- Two-column body -->
  <div class="progress-layout">
    <!-- Left: Event Log -->
    <div>
      <div class="events-log" data-testid="events-log" *ngIf="visibleEvents().length > 0">
        <div
          *ngFor="let event of visibleEvents()"
          class="event"
          [attr.data-event-type]="event.type"
        >
          <span class="event-time">{{ event.timestamp | date: 'HH:mm:ss' }}</span>
          <span class="badge badge-{{ event.type }}">{{ event.type }}</span>
          <span class="event-message">{{ event.message }}</span>
        </div>
      </div>

      <p class="no-events" *ngIf="visibleEvents().length === 0" data-testid="no-events">
        Waiting for events&hellip;
      </p>
    </div>

    <!-- Right: Screenshot -->
    <div class="screenshot-panel" *ngIf="store.latestScreenshot()">
      <div class="panel-label">
        <span>Live preview</span>
      </div>
      <img
        [src]="'data:image/png;base64,' + store.latestScreenshot()"
        alt="Latest page screenshot"
      />
    </div>
  </div>
</div>
